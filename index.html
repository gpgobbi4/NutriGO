<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriGo | Catálogo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dorado: #b79455; --fondo: #fdfbf9; }
        body { font-family: Arial, sans-serif; margin: 0; background: var(--fondo); color: #333; }
        header { background: white; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .productos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; padding: 20px; max-width: 1100px; margin: auto; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .card img { width: 100%; height: auto; display: block; min-height: 200px; background: #eee; }
        .info { padding: 20px; }
        .btn { border: 2px solid var(--dorado); color: var(--dorado); padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; background: none; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: white; margin: 5% auto; padding: 15px; width: 90%; max-width: 450px; border-radius: 10px; position: relative; }
        .close { position: absolute; right: 15px; top: 5px; font-size: 30px; cursor: pointer; }
        .whatsapp { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 35px; text-decoration: none; }
    </style>
</head>
<body>

<header>
    <h1 style="color:var(--dorado); margin:0;">NutriGo</h1>
    <p style="margin:5px 0 0;">ALIMENTO LÁCTEO PROTEICO</p>
</header>

<div class="productos-grid">
    <div class="card">
        <img src="assets/img/Etoqueta-Cafe.jpg" onerror="tryNext(this)" alt="NutriGo Café">
        <div class="info">
            <h3>Sabor Café</h3>
            <button class="btn" onclick="openM('m1')">Ver Nutrición</button>
        </div>
    </div>

    <div class="card">
        <img src="assets/img/Etiqueta-Frapuccino.jpg" onerror="tryNext(this)" alt="NutriGo Frappuccino">
        <div class="info">
            <h3>Sabor Frappuccino</h3>
            <button class="btn" onclick="openM('m2')">Ver Nutrición</button>
        </div>
    </div>

    <div class="card">
        <img src="assets/img/Etiquetas-Frutos-rojos.jpg" onerror="tryNext(this)" alt="NutriGo Frutos Rojos">
        <div class="info">
            <h3>Sabor Frutos Rojos</h3>
            <button class="btn" onclick="openM('m3')">Ver Nutrición</button>
        </div>
    </div>
</div>

<div id="m1" class="modal"><div class="modal-content"><span class="close" onclick="closeM('m1')">&times;</span><img src="assets/img/Tabla-Café.jpg" onerror="tryNext(this)" style="width:100%"></div></div>
<div id="m2" class="modal"><div class="modal-content"><span class="close" onclick="closeM('m2')">&times;</span><img src="assets/img/Tabla-frapuccino.jpg" onerror="tryNext(this)" style="width:100%"></div></div>
<div id="m3" class="modal"><div class="modal-content"><span class="close" onclick="closeM('m3')">&times;</span><img src="assets/img/Tabla-Frutos-rojos.jpg" onerror="tryNext(this)" style="width:100%"></div></div>

<a href="https://wa.me/5493510000000" class="whatsapp" target="_blank"><i class="fab fa-whatsapp"></i></a>

<script>
    // Esta función es la que "adivina" la extensión si la primera falla
    function tryNext(img) {
        const extensions = ['png', 'jpeg', 'PNG', 'JPG', 'JPEG'];
        let currentSrc = img.src;
        let baseName = currentSrc.substring(0, currentSrc.lastIndexOf('.'));
        let currentExt = currentSrc.substring(currentSrc.lastIndexOf('.') + 1);

        // Si ya probamos todas las extensiones, nos detenemos para evitar bucles
        if (img.dataset.tried === undefined) img.dataset.tried = "0";
        let index = parseInt(img.dataset.tried);

        if (index < extensions.length) {
            img.src = baseName + "." + extensions[index];
            img.dataset.tried = (index + 1).toString();
        }
    }

    function openM(id) { document.getElementById(id).style.display = "block"; }
    function closeM(id) { document.getElementById(id).style.display = "none"; }
    window.onclick = function(e) { if (e.target.className === 'modal') e.target.style.display = "none"; }
</script>

</body>
</html>
